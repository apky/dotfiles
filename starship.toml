# ~/.config/starship.toml

# Modified from the Tokyo Night preset: https://starship.rs/presets/tokyo-night

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# A continuation prompt that displays two filled-in arrows
continuation_prompt = 'â–¶â–¶ '

format = """
[ ïپ¼](bg:#769ff0 fg:#e3e5e5)\
$directory\
[î‚´](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[î‚´](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
[î‚´](fg:#212736)\
$fill\
$kubernetes\
$cmd_duration\
$time\
[î‚´ ](fg:#1e1d2c)\
\n$character"""

right_format = """$python"""

[character]
success_symbol = '[لگ±âˆ–](bold green)'
error_symbol = '[لگ±âˆ–](bold red)'
# لگ± is CANADIAN SYLLABICS PI Unicode: U+1431, UTF-8: E1 90 B1
# ة… is LATIN CAPITAL LETTER TURNED V Unicode: U+0245, UTF-8: C9 85
# خ› is GREEK CAPITAL LETTER LAMDA Unicode: U+039B, UTF-8: CE 9B
# ً‌ڑ² MATHEMATICAL BOLD CAPITAL LAMDA Unicode: U+1D6B2, UTF-8: F0 9D 9A B2
# âˆ– is SET MINUS Unicode: U+2216, UTF-8: E2 88 96
# \ is REVERSE SOLIDUS Unicode: U+005C, UTF-8: 5C
# â•² is BOX DRAWINGS LIGHT DIAGONAL UPPER LEFT TO LOWER RIGHT Unicode: U+2572, UTF-8: E2 95 B2
# ï¼¼is FULLWIDTH REVERSE SOLIDUS Unicode: U+FF3C, UTF-8: EF BC BC
# ï¹¨ is SMALL REVERSE SOLIDUS Unicode: U+FE68, UTF-8: EF B9 A8

[fill]
symbol = " "
style = 'fg:#a0a9cb'

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™"
"Downloads" = "ï€™ "
"Music" = "ï€پ "
"Pictures" = "ï€¾ "

[git_branch]
symbol = "ïگک"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'
conflicted = '=${count}'
ahead = 'â‡،${count}'
diverged = 'â‡•â‡،${ahead_count}â‡£${behind_count}'
behind = 'â‡£${count}'
untracked = '?${count}'
stashed = '$${count}'
modified = '!${count}'
staged = '+${count}'
renamed = 'آ»${count}'
deleted = 'âœک${count}'

[nodejs]
symbol = "îœک"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "î‍¨"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "îک§"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "îکˆ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[kubernetes]
disabled = false
symbol = "âک¸"
style = "bg:#1e1d2c"
format = '[($symbol $context )]($style)'

[[kubernetes.contexts]]
# Warn me if I am in a production environment
context_pattern = "gke_.*_(?P<cluster>[\\w-]*prd[\\w-]+)"
style = "fg:red bg:#1d2230"
context_alias = "!! $cluster !!"

[[kubernetes.contexts]]
# Using capture groups
# Contexts from GKE, AWS and other cloud providers usually carry additional information, like the region/zone.
# The following entry matches on the GKE format (`gke_projectname_zone_cluster-name`)
# and renames every matching kube context into a more readable format (`gke-cluster-name`):
context_pattern = "gke_.*_(?P<cluster>[\\w-]+)"
context_alias = "$cluster"

[[kubernetes.contexts]]
# AWS EKS context pattern
# Matches EKS ARN format (arn:aws:eks:region:account-id:cluster/cluster-name) 
# and extracts just the cluster name
context_pattern = "arn:aws:eks:[\\w-]+:\\d+:cluster/(?P<cluster>[\\w-]+)"
context_alias = "$cluster"

[python]
disabled = false
symbol = "îœ¼"
style = "fg:#769ff0 bg:#212736"
python_binary = ['python3', 'python']
detect_files = ['poetry.lock', '.python-version', 'Pipfile', '__init__.py', 'pyproject.toml', 'requirements.txt', 'setup.py', 'tox.ini']
format = '[( $symbol $virtualenv)]($style)'

[cmd_duration]
min_time = 500
style = "bg:#1e1d2c fg:bold yellow"
format = '[َ°¦– $duration]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1e1d2c"
format = '[[ ïگ؛ $time ](fg:#a0a9cb)]($style)'
